// Converts viewport clientX/Y to canvas logical coordinates.
// Accounts for canvas offset on page AND DPR scaling.
function toCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height)
  };
}

// ── ORIENTATION LOCK ───────────────────────────────────
const rotateOverlay = document.getElementById('rotateOverlay');

function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth <= 1024;

  if (isPortrait && isMobile) {
    rotateOverlay.classList.add('show');
    canvas.style.display = 'none';
  } else {
    rotateOverlay.classList.remove('show');
    canvas.style.display = 'block';
    // Re-resize canvas after orientation change
    if (typeof resizeCanvas === 'function') resizeCanvas();
  }
}

// Try to lock orientation via API (works on Android Chrome, some PWA contexts)
function tryLockLandscape() {
  const sc = window.screen;
  const lock = sc.orientation?.lock || sc.lockOrientation || sc.mozLockOrientation || sc.msLockOrientation;
  if (lock) {
    try {
      const result = sc.orientation ? sc.orientation.lock('landscape') : lock.call(sc, 'landscape');
      if (result && result.catch) result.catch(() => {}); // ignore errors silently
    } catch(e) {}
  }
}

window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => {
  setTimeout(checkOrientation, 150); // small delay for resize to settle
});
document.addEventListener('DOMContentLoaded', () => {
  checkOrientation();
  tryLockLandscape();
});

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  updateArena();
}
resizeCanvas();
checkOrientation();

function GSC() {
  return Math.max(0.45, Math.min(1.3, Math.min(W, H) / 700));
}

// ── UPDATE ABILITY FX ──────────────────────────────────
function updateAbilityFX(DT=1){
  if(shieldTimer>0){ shieldTimer-=DT; if(shieldTimer<=0) shieldActive=false; }
  if(abilityCDs.q>0){ abilityCDs.q-=DT; if(abilityCDs.q<0)abilityCDs.q=0; }
  if(abilityCDs.e>0){ abilityCDs.e-=DT; if(abilityCDs.e<0)abilityCDs.e=0; }
  if(abilityCDs.r>0){ abilityCDs.r-=DT; if(abilityCDs.r<0)abilityCDs.r=0; }

  for(let i=abilityFX.length-1;i>=0;i--){
    const fx=abilityFX[i];
    fx.life-=DT;
    if(fx.type==='wave'||fx.type==='burst') fx.r+=(fx.maxR/fx.maxLife)*1.5*DT;
    if(fx.type==='bomb'){
      fx.x+=fx.vx*DT; fx.y+=fx.vy*DT; fx.vx*=Math.pow(0.93,DT); fx.vy*=Math.pow(0.93,DT);
      if(fx.life<fx.maxLife*0.3&&!fx.exploded){
        fx.exploded=true;
        spawnParticles(fx.x,fx.y,'#ff6b35',35);
        screenShake=Math.max(screenShake,14);
        enemies.forEach(e=>{ if(Math.hypot(e.x-fx.x,e.y-fx.y)<110){ e.hp-=90+lito.level*8; e.hitFlash=12; addDamageText(e.x,e.y-10,90,'#ff6b35',18); } });
        if(Math.hypot(lito.x-fx.x,lito.y-fx.y)>30) {} // player-safe
      }
    }
    if(fx.life<=0) abilityFX.splice(i,1);
  }
}

// ── DRAW ABILITY FX ────────────────────────────────────
function drawAbilityFX(){
  for(const fx of abilityFX){
    const a=fx.life/fx.maxLife;
    ctx.save(); ctx.globalAlpha=a*0.7;
    if(fx.type==='wave'||fx.type==='burst'){
      ctx.beginPath(); ctx.arc(fx.x,fx.y,fx.r,0,Math.PI*2);
      ctx.strokeStyle=fx.col; ctx.lineWidth=3+a*8; ctx.stroke();
    } else if(fx.type==='cone'){
      ctx.translate(fx.x,fx.y);
      ctx.fillStyle=fx.col;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.arc(0,0,130,fx.ang-0.36,fx.ang+0.36);
      ctx.closePath(); ctx.fill();
    } else if(fx.type==='bomb'){
      ctx.shadowBlur=20; ctx.shadowColor='#ff6b35';
      ctx.beginPath(); ctx.arc(fx.x,fx.y,10+a*4,0,Math.PI*2);
      ctx.fillStyle='#ff6b35'; ctx.fill();
    }
    ctx.restore();
  }
  // Shield
  if(shieldActive){
    const pulse=1+Math.sin(Date.now()*0.01)*0.08;
    ctx.save();
    ctx.beginPath(); ctx.arc(lito.x,lito.y,(lito.r+18)*GSC()*pulse,0,Math.PI*2);
    ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=3;
    ctx.shadowBlur=15; ctx.shadowColor='#4fc3f7';
    ctx.stroke(); ctx.shadowBlur=0;
    ctx.globalAlpha=0.12; ctx.fillStyle='#4fc3f7'; ctx.fill();
    ctx.restore();
  }
}

// ── DRAW ABILITY HUD ───────────────────────────────────
function drawAbilityHUD(){
  const def=CHAR_DEFS[selectedChar];
  const {fs,pad}=ui();
  const slots=['q','e','r'];
  const btnSz=Math.max(50,Math.round(Math.min(W,H)*0.085));
  const gutter=8;
  const totalW=slots.length*btnSz+(slots.length-1)*gutter;
  const startX=W/2-totalW/2;
  const startY=H-pad-btnSz;

  slots.forEach((slot,i)=>{
    const ab=def.abilities[slot];
    const bx=startX+i*(btnSz+gutter), by=startY;
    const cd=abilityCDs[slot], maxCD=ab.cd;
    const ready=cd<=0;

    // Box
    ctx.fillStyle=ready?'rgba(5,8,16,0.88)':'rgba(5,8,16,0.70)';
    ctx.fillRect(bx,by,btnSz,btnSz);
    ctx.strokeStyle=ready?ab.col:'#334';
    ctx.lineWidth=ready?2:1.5; ctx.strokeRect(bx,by,btnSz,btnSz);

    // Cooldown overlay (pie)
    if(!ready){
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.moveTo(bx+btnSz/2,by+btnSz/2);
      const prog=(cd/maxCD)*Math.PI*2;
      ctx.arc(bx+btnSz/2,by+btnSz/2,btnSz/2,- Math.PI/2,- Math.PI/2+prog);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }

    // Icon
    ctx.font=`${Math.round(btnSz*0.42)}px serif`;
    ctx.textAlign='center';
    ctx.globalAlpha=ready?1:0.5;
    ctx.fillText(ab.icon,bx+btnSz/2,by+btnSz*0.58);
    ctx.globalAlpha=1;

    // Key label
    ctx.fillStyle=ready?ab.col:'#445';
    ctx.font=`bold ${fs.xs}px Georgia`; ctx.textAlign='center';
    ctx.fillText(ab.key,bx+btnSz/2,by+btnSz*0.88);

    // CD seconds
    if(!ready){
      ctx.fillStyle='white'; ctx.font=`bold ${Math.round(btnSz*0.25)}px Georgia`;
      ctx.fillText(Math.ceil(cd/60)+'s',bx+btnSz/2,by+btnSz*0.55);
    }

    // Name below
    ctx.fillStyle='#aaa'; ctx.font=`${fs.xs-1}px Georgia`;
    ctx.fillText(ab.name,bx+btnSz/2,by+btnSz+fs.xs);
  });
}

// ── DRAW MOBILE ABILITY BUTTONS ────────────────────────
function drawMobileAbilityBtns(){
  if(controlMode!=='mobile') return;
  const def=CHAR_DEFS[selectedChar];
  const slots=['q','e','r'];
  const btnR=Math.round(Math.max(28,Math.min(W,H)*0.07));
  const startX=W-btnR*2-10;
  const startY=H-btnR*7;
  slots.forEach((slot,i)=>{
    const ab=def.abilities[slot];
    const bx=startX, by=startY+i*(btnR*2+8);
    const ready=abilityCDs[slot]<=0;
    ctx.save();
    ctx.beginPath(); ctx.arc(bx,by,btnR,0,Math.PI*2);
    ctx.fillStyle=ready?`${ab.col}33`:'rgba(10,10,20,0.7)'; ctx.fill();
    ctx.strokeStyle=ready?ab.col:'#334'; ctx.lineWidth=2; ctx.stroke();
    ctx.font=`${Math.round(btnR*0.72)}px serif`; ctx.textAlign='center';
    ctx.globalAlpha=ready?1:0.4;
    ctx.fillText(ab.icon,bx,by+btnR*0.32);
    ctx.globalAlpha=1;
    ctx.fillStyle=ready?'white':'#556';
    ctx.font=`bold ${Math.round(btnR*0.35)}px Georgia`;
    ctx.fillText(ab.key,bx,by+btnR*0.7);
    if(!ready){
      ctx.fillStyle='white'; ctx.font=`bold ${Math.round(btnR*0.38)}px Georgia`;
      ctx.fillText(Math.ceil(abilityCDs[slot]/60)+'s',bx,by+btnR*0.25);
    }

  });
}

  const idx = (w/5) - 1; // wave5→0, wave10→1, wave15→2 ...

  if(w===7)  return {goblin:10,orc:4,specter:6,phantom:3};
  if(w===8)  return {orc:6,specter:6,brute:2,archer:4};
  if(w===9)  return {goblin:12,orc:5,specter:8,bomber:3,phantom:4};
  if(w===11) return {slime:20,goblin:10,orc:6,brute:3,archer:6};
  if(w===12) return {specter:10,phantom:8,brute:3,archer:5,bomber:4};
  if(w===13) return {orc:8,titan:2,specter:8,phantom:5};
  if(w===14) return {goblin:15,orc:8,brute:4,titan:2,bomber:5};
  if(w===16) return {titan:3,orc:10,brute:5,archer:8,phantom:6};
  if(w===17) return {titan:4,specter:12,phantom:8,bomber:6};
  if(w===18) return {titan:3,brute:6,orc:10,archer:10,bomber:4};
  if(w===19) return {titan:4,brute:8,phantom:10,specter:10};
  // Beyond wave 19: scale up
  const e=w-19;
  return {slime:e*3,goblin:e*3,orc:e*2,specter:e*2,brute:e+2,
          archer:e*2,bomber:Math.ceil(e*0.8),phantom:e,titan:Math.ceil(e*0.5)};
}

// Get nearest player position for enemy AI
function nearestPlayer(ex,ey){
  let nd=Infinity,nx=lito.x,ny=lito.y;
  if(lito.hp>0){ const d=Math.hypot(lito.x-ex,lito.y-ey); if(d<nd){nd=d;nx=lito.x;ny=lito.y;} }
  for(const p of Object.values(remotePlayers)){
    if(p.alive===false) continue;
    const d=Math.hypot(p.x-ex,p.y-ey);
    if(d<nd){nd=d;nx=p.x;ny=p.y;}
  }
  return {x:nx,y:ny};
}

function drawLito(){
  const angle=Math.atan2(mouseY-lito.y,mouseX-lito.x);
  lito.facing=Math.cos(angle)>=0?1:-1;
  const bob=Math.sin(Date.now()*0.0045)*2.5;
  const s=1.5;
  // Flash/dash filters applied via wrapper
  ctx.save();
  if(lito.hitFlash>0) ctx.filter='brightness(2.5) saturate(0.2)';
  if(lito.dashTimer>0) ctx.globalAlpha=0.82;
  if(selectedChar==='anita'){
    drawAnita(lito.x,lito.y+bob,lito.facing,lito.expression,s);
  } else if(selectedChar==='flami'){
    drawFlami(lito.x,lito.y+bob,lito.facing,lito.expression,s);
  } else {
    const _gs=GSC();ctx.translate(lito.x,lito.y+bob);ctx.scale(lito.facing*s*_gs,s*_gs);
    litoCore(ctx,lito.expression,lito.facing,mouseX,mouseY,lito.y+bob);
  }
  ctx.restore();

  if(gameMode==='multi'){
    const cd=CHAR_DEFS[selectedChar].col;

    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(lito.x-30,lito.y-52,60,16);

}

// Draw a remote player
function drawRemotePlayer(p){
  if(!p.x||!p.y) return;
  const bob=Math.sin(Date.now()*0.0045+p.x)*2.5;
  const hue=PLAYER_HUES[p.colorIdx||0];
  const ch=p.char||'lito';
  const hueFilter=hue!==0?`hue-rotate(${hue}deg)`:'';
  const hitFilter=p.hitFlash>0?'brightness(2.5) saturate(0.2)':'';
  ctx.save();
  if(hueFilter||hitFilter) ctx.filter=[hueFilter,hitFilter].filter(Boolean).join(' ');
  if(p.alive===false) ctx.globalAlpha=0.3;
  if(ch==='anita'){
    drawAnita(p.x,p.y+bob,p.facing||1,p.expression||'innocent',1.5);
  } else if(ch==='flami'){
    drawFlami(p.x,p.y+bob,p.facing||1,p.expression||'innocent',1.5);
  } else {
    const _gs2=GSC();
    ctx.translate(p.x,p.y+bob);ctx.scale((p.facing||1)*1.5*_gs2,1.5*_gs2);
    litoCore(ctx,p.expression||'innocent',p.facing||1,p.x+50,p.y,p.y+bob);
  }
  ctx.restore();
  // Name tag
  ctx.save();
  const {fs:_rfs}=ui();
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(p.x-28,p.y-48,56,16);
  ctx.filter=`hue-rotate(${hue}deg)`;
  ctx.fillStyle='#ffe082';ctx.font=`bold ${_rfs.xs}px Georgia`;ctx.textAlign='center';
  ctx.fillText(p.name||'?',p.x,p.y-36);
  ctx.restore();
}

// ── BOSS HP BAR (full screen top) ─────────────────────────
function drawBossBar(){
  if(!bossEnemy||bossEnemy.hp<=0) return;
  const {fs, pad, topH} = ui();
  const bw=Math.min(W*0.55,500);
  const bh=Math.round(Math.max(16, H*0.038));
  const labelH=Math.round(fs.xs*1.6);
  const bx=W/2-bw/2;
  const by=topH + pad + labelH;
  const pulse=Math.sin(Date.now()*0.006)*0.15+0.85;
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(bx-4,by-labelH-4,bw+8,bh+labelH+10);
  ctx.strokeStyle='#f1c40f';ctx.lineWidth=2;ctx.strokeRect(bx-4,by-labelH-4,bw+8,bh+labelH+10);
  ctx.fillStyle='#f1c40f';ctx.font=`bold ${fs.xs}px Georgia`;ctx.textAlign='center';
  ctx.fillText(`\uD83D\uDC51 JEFE: ${bossEnemy.name}`,W/2,by-4);
  ctx.fillStyle='#1a0a0a';ctx.fillRect(bx,by,bw,bh);
  const ratio=bossEnemy.hp/bossEnemy.maxHp;
  const col=ratio>0.5?'#e74c3c':ratio>0.25?'#f39c12':'#c0392b';
  ctx.fillStyle=col;ctx.globalAlpha=pulse;
  ctx.fillRect(bx,by,bw*ratio,bh);ctx.globalAlpha=1;
  ctx.strokeStyle='#f1c40f';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='white';ctx.font=`bold ${fs.xs}px Georgia`;ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(bossEnemy.hp)} / ${bossEnemy.maxHp}`,W/2,by+Math.round(bh*0.72));
}

// ── ORB SYSTEM ─────────────────────────────────────────────
let orbs = []; // {x,y,type:'heal'|'speed',r,life,vx,vy,bob}
const ORB_HEAL_AMT = 40;
const ORB_SPEED_DUR = 240; // frames
const ORB_SPEED_MULT = 1.8;
let litoSpeedBoost = 0; // frames remaining

function spawnOrb(x, y, type) {
  const angle = Math.random()*Math.PI*2;
  orbs.push({x, y, type, r:10, life:600, vx:Math.cos(angle)*1.2, vy:Math.sin(angle)*1.2-1.5, bob:Math.random()*Math.PI*2});
}

function playHeal(){ snd(ac=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';[440,523,659].forEach((f,i)=>{const t=ac.currentTime+i*0.08;const o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.type='sine';o2.frequency.setValueAtTime(f,t);g2.gain.setValueAtTime(0.15,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.2);o2.start(t);o2.stop(t+0.2);}); }); }
function playSpeed(){ snd(ac=>{[800,1000,1200,1400].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='square';const t=ac.currentTime+i*0.05;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);}); }); }
function playBossIntro(){ snd(ac=>{[110,98,87,73].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sawtooth';const t=ac.currentTime+i*0.3;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);}); }); }

function drawOrbs(){
  for(const orb of orbs){
    const bob=Math.sin(orb.bob+Date.now()*0.004)*5;
    ctx.save();ctx.translate(orb.x,orb.y+bob);
    const fade=Math.min(1,orb.life/60);ctx.globalAlpha=fade;
    if(orb.type==='heal'){
      ctx.shadowBlur=18;ctx.shadowColor='#2ecc71';
      ctx.beginPath();ctx.arc(0,0,orb.r,0,Math.PI*2);
      const g=ctx.createRadialGradient(0,0,0,0,0,orb.r);
      g.addColorStop(0,'#afffcf');g.addColorStop(1,'#27ae60');
      ctx.fillStyle=g;ctx.fill();
      ctx.fillStyle='white';ctx.font='bold 11px serif';ctx.textAlign='center';ctx.fillText('❤',0,4);
    } else {
      ctx.shadowBlur=18;ctx.shadowColor='#3498db';
      ctx.beginPath();ctx.arc(0,0,orb.r,0,Math.PI*2);
      const g=ctx.createRadialGradient(0,0,0,0,0,orb.r);
      g.addColorStop(0,'#aee6ff');g.addColorStop(1,'#2980b9');
      ctx.fillStyle=g;ctx.fill();
      ctx.fillStyle='white';ctx.font='bold 12px serif';ctx.textAlign='center';ctx.fillText('⚡',0,4);
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

function moveOrbs(DT=1){
  for(let i=orbs.length-1;i>=0;i--){
    const orb=orbs[i];
    orb.bob+=0.05*DT;
    orb.vx*=Math.pow(0.96,DT);orb.vy*=Math.pow(0.96,DT);
    orb.x+=orb.vx*DT;orb.y+=orb.vy*DT;
    orb.life-=DT;
    // Pick up check
    if(Math.hypot(orb.x-lito.x,orb.y-lito.y)<orb.r+lito.r+8){
      if(orb.type==='heal'){
        const orbHeal=selectedChar==='lito'?Math.round(ORB_HEAL_AMT*1.25):ORB_HEAL_AMT;
        lito.hp=Math.min(lito.maxHp,lito.hp+orbHeal);
        playHeal();spawnParticles(lito.x,lito.y,'#2ecc71',12);
        addDamageText(lito.x,lito.y-30,'+'+Math.ceil(ORB_HEAL_AMT)+'HP','#2ecc71',22);
      } else {
        litoSpeedBoost=ORB_SPEED_DUR;
        playSpeed();spawnParticles(lito.x,lito.y,'#3498db',12);
        addDamageText(lito.x,lito.y-30,'⚡ TURBO','#3498db',22);
      }
      orbs.splice(i,1);continue;
    }
    if(orb.life<=0) orbs.splice(i,1);
  }
}

// ── DRAW: ANITA ────────────────────────────────────────
function drawAnita(x,y,facing,expr,scale){
  const t=Date.now()*0.003;
  const s=scale*GSC();
  ctx.save(); ctx.translate(x,y); ctx.scale(facing*s,s);
  // Body — sleek, dark suit
  ctx.beginPath();ctx.ellipse(0,10,11,14,0,0,Math.PI*2);
  ctx.fillStyle='#3d1f5e';ctx.fill();ctx.strokeStyle='#1a0030';ctx.lineWidth=2;ctx.stroke();
  // Scarf / sash
  ctx.beginPath();ctx.ellipse(0,6,14,5,0,0,Math.PI*2);
  ctx.fillStyle='#e056ba';ctx.fill();ctx.strokeStyle='#a01880';ctx.lineWidth=1.5;ctx.stroke();
  // Arms
  for(const sx of [-1,1]){
    ctx.beginPath();ctx.ellipse(sx*14,8,5,8,sx*0.35,0,Math.PI*2);
    ctx.fillStyle='#3d1f5e';ctx.fill();ctx.strokeStyle='#1a0030';ctx.lineWidth=1.5;ctx.stroke();
  }
  // Head
  ctx.beginPath();ctx.arc(0,-4,15,0,Math.PI*2);
  ctx.fillStyle='#c0a0f0';ctx.fill();ctx.strokeStyle='#1a0030';ctx.lineWidth=2.5;ctx.stroke();
  // Hair — long dark
  ctx.beginPath();ctx.ellipse(0,-10,16,8,0,0,Math.PI*2);
  ctx.fillStyle='#1a0030';ctx.fill();
  ctx.beginPath();ctx.ellipse(-12,-4,5,14,0.4,0,Math.PI*2);
  ctx.fillStyle='#1a0030';ctx.fill();
  ctx.beginPath();ctx.ellipse(12,-4,5,14,-0.4,0,Math.PI*2);
  ctx.fillStyle='#1a0030';ctx.fill();
  // Ears (cat ears!)
  for(const sx of [-1,1]){
    ctx.beginPath();ctx.moveTo(sx*6,-17);ctx.lineTo(sx*14,-30);ctx.lineTo(sx*16,-14);ctx.closePath();
    ctx.fillStyle='#1a0030';ctx.fill();
    ctx.beginPath();ctx.moveTo(sx*7,-18);ctx.lineTo(sx*13,-27);ctx.lineTo(sx*15,-16);ctx.closePath();
    ctx.fillStyle='#e056ba';ctx.fill();
  }
  // Eyes — sharp, feline
  const angle2=Math.atan2(mouseY-y,mouseX-x)*0.3;
  for(const [ox,sh] of [[-5,-8.5],[5,2.5]]){
    ctx.beginPath();ctx.ellipse(ox,-5,6.5,4.5,0,0,Math.PI*2);
    ctx.fillStyle='white';ctx.fill();ctx.strokeStyle='#1a0030';ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.ellipse(ox+angle2,-5,3,4,0,0,Math.PI*2);
    ctx.fillStyle='#9b59b6';ctx.fill();
    ctx.beginPath();ctx.ellipse(ox+angle2*0.5,-5,1.5,2.5,0,0,Math.PI*2);
    ctx.fillStyle='#0a0010';ctx.fill();
    ctx.beginPath();ctx.arc(sh,-7.5,1.2,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  }
  // Mouth
  ctx.strokeStyle='#1a0030';ctx.lineWidth=1.5;
  if(expr==='innocent'){ctx.beginPath();ctx.arc(0,2,2.5,0.1,Math.PI-0.1);ctx.stroke();}
  else if(expr==='serious'){ctx.beginPath();ctx.moveTo(-3,2);ctx.lineTo(3,2);ctx.stroke();}
  else{ctx.beginPath();ctx.arc(0,2,2.5,0,Math.PI*2);ctx.fillStyle='#1a0030';ctx.fill();}
  // Speed particles when boosted
  if(litoSpeedBoost>0){
    ctx.fillStyle='#e056ba';ctx.globalAlpha=0.6;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-10+i*2,(8+i*5),2,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

    ctx.beginPath();ctx.arc(ox+angle2,-6,3.5,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();
    ctx.beginPath();ctx.arc(ox+angle2,-6,1.5,0,Math.PI*2);ctx.fillStyle='#0a0000';ctx.fill();
    ctx.beginPath();ctx.arc(sh,-8,1,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  }
  ctx.shadowBlur=0;
  // Mouth
  ctx.strokeStyle='#a03010';ctx.lineWidth=2;
  if(expr==='innocent'){ctx.beginPath();ctx.arc(0,2,3,0,Math.PI);ctx.stroke();}
  else if(expr==='serious'){ctx.beginPath();ctx.moveTo(-4,2);ctx.lineTo(4,2);ctx.stroke();}
  else{ctx.beginPath();ctx.arc(0,2,3,0,Math.PI*2);ctx.fillStyle='#a03010';ctx.fill();}
  // Fire aura when Q is active
  if(abilityCDs.q>0&&abilityCDs.q>CHAR_DEFS.flami.abilities.q.cd-20){
    ctx.globalAlpha=0.5;
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*22,Math.sin(a)*22-5,5,0,Math.PI*2);ctx.fillStyle='#ff6b35';ctx.fill();}
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawArena(){
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  bg.addColorStop(0,'#1c2e1c');bg.addColorStop(1,'#050810');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  for(let gx=aX;gx<aX+aW;gx+=ts) for(let gy=aY;gy<aY+aH;gy+=ts){

  }
  ctx.save();ctx.strokeStyle='#c0932a';ctx.lineWidth=3;ctx.shadowBlur=18;ctx.shadowColor='#c0932a';

// ── DRAW: HUD ──────────────────────────────────────────
function drawHUD(){
  const {sc,pad,topH,botH,barW,btnW,btnH,fs,pbX,pbY,pbR} = ui();

  // ── TOP BAR: three panels side-by-side ──────────────
  const topY = pad;
  const panH = topH;
  const killW = Math.min(140, W*0.18);
  const ptsW  = Math.min(160, W*0.20);
  const waveW = Math.min(W - killW - ptsW - pbR*2 - pad*4, 220);
  const waveX = W/2 - waveW/2;

  // BAJAS
  ctx.fillStyle='rgba(5,8,16,0.88)'; ctx.fillRect(pad,topY,killW,panH);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.5; ctx.strokeRect(pad,topY,killW,panH);
  ctx.fillStyle='#c0932a'; ctx.font=`bold ${fs.xs}px Georgia`; ctx.textAlign='center';
  ctx.fillText('BAJAS', pad+killW/2, topY+fs.xs+3);
  ctx.fillStyle='white'; ctx.font=`bold ${fs.md}px Georgia`;

  // OLA (center, clear of pause button)
  ctx.fillStyle='rgba(5,8,16,0.88)'; ctx.fillRect(waveX,topY,waveW,panH);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.5; ctx.strokeRect(waveX,topY,waveW,panH);
  ctx.fillStyle='#c0932a'; ctx.font=`bold ${fs.xs}px Georgia`; ctx.textAlign='center';
  ctx.fillText('OLA '+wave, W/2, topY+fs.xs+3);
  ctx.fillStyle='white'; ctx.font=`bold ${fs.sm}px Georgia`;
  ctx.fillText(enemies.length>0?'Enemigos: '+enemies.length:'¡Área limpia!', W/2, topY+panH-6);

  // PUNTOS (right, stops before pause button)
  const ptsX = W - pad*2 - pbR*2 - ptsW;
  ctx.fillStyle='rgba(5,8,16,0.88)'; ctx.fillRect(ptsX,topY,ptsW,panH);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.5; ctx.strokeRect(ptsX,topY,ptsW,panH);

  ctx.fillText('PUNTOS', ptsX+ptsW/2, topY+fs.xs+3);
  ctx.fillStyle='white'; ctx.font=`bold ${fs.md}px Georgia`;
  ctx.fillText(lito.score.toLocaleString(), ptsX+ptsW/2, topY+panH-6);

  // ── PAUSE BUTTON — top-right corner ─────────────────
  ctx.save();
  ctx.fillStyle='rgba(5,8,16,0.90)';
  ctx.beginPath(); ctx.arc(pbX,pbY,pbR,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.5;

  ctx.fillText('⏸', pbX, pbY+Math.round(pbR*0.38));
  ctx.restore();

  // ── BOTTOM-LEFT: HP + XP + DASH ──────────────────────
  const bx = pad;

  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.2; ctx.strokeRect(bx-2,dashY-fs.xs-2,barW+4,dh+fs.xs+6);
  ctx.fillStyle='#0a1018'; ctx.fillRect(bx,dashY,barW,dh);
  const dr = 1-(lito.dashCooldown/lito.dashCooldownMax);

  dg.addColorStop(0,'#4fc3f7'); dg.addColorStop(1,'#98D8C8');
  ctx.fillStyle=dg; ctx.fillRect(bx,dashY,barW*Math.max(0,dr),dh);
  ctx.strokeStyle='#c0932a'; ctx.strokeRect(bx,dashY,barW,dh);
  ctx.fillStyle='white'; ctx.font=`bold ${fs.xs}px Georgia`; ctx.textAlign='left';
  ctx.fillText(lito.dashCooldown<=0?'DASH LISTO':'DASH RECARGANDO...', bx, dashY-3);

  // HP bar
  ctx.fillStyle='rgba(5,8,16,0.90)'; ctx.fillRect(bx-2,hpY-2,barW+4,hh+xh+6);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1.5; ctx.strokeRect(bx-2,hpY-2,barW+4,hh+xh+6);
  ctx.fillStyle='#1a0a0a'; ctx.fillRect(bx,hpY,barW,hh);
  const hg = ctx.createLinearGradient(bx,0,bx+barW,0);
  hg.addColorStop(0,'#c0392b'); hg.addColorStop(1,'#e74c3c');
  ctx.fillStyle=hg; ctx.fillRect(bx,hpY,barW*(lito.hp/lito.maxHp),hh);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1; ctx.strokeRect(bx,hpY,barW,hh);
  ctx.fillStyle='white'; ctx.font=`bold ${fs.sm}px Georgia`; ctx.textAlign='center';
  ctx.fillText(`❤ ${Math.ceil(lito.hp)} / ${lito.maxHp}`, bx+barW/2, hpY+hh-4);
  // XP bar
  const xpY = hpY+hh+2;
  ctx.fillStyle='#0a1a0a'; ctx.fillRect(bx,xpY,barW,xh);
  const xg=ctx.createLinearGradient(bx,0,bx+barW,0);
  xg.addColorStop(0,'#27ae60'); xg.addColorStop(1,'#2ecc71');
  ctx.fillStyle=xg; ctx.fillRect(bx,xpY,barW*(lito.xp/lito.xpNeed),xh);
  ctx.strokeStyle='#c0932a'; ctx.lineWidth=1; ctx.strokeRect(bx,xpY,barW,xh);
  ctx.fillStyle='#aaa'; ctx.font=`${fs.xs}px Georgia`; ctx.textAlign='right';
  ctx.fillText(`Nv.${lito.level}`, bx+barW, xpY+xh);

  // ── BOTTOM-RIGHT: Mute + Record ──────────────────────
  const muteH=Math.round(Math.max(24, Math.min(H*0.055, 34)));
  const muteW=Math.round(muteH*1.45);
  const muteX=W-pad-muteW, muteY=H-pad-muteH;
  ctx.save();
  ctx.fillStyle=soundEnabled?'rgba(5,8,16,0.88)':'rgba(80,20,20,0.88)';
  ctx.fillRect(muteX,muteY,muteW,muteH);
  ctx.strokeStyle=soundEnabled?'#c0932a':'#e74c3c'; ctx.lineWidth=1.5;
  ctx.strokeRect(muteX,muteY,muteW,muteH);
  ctx.fillStyle=soundEnabled?'#c0932a':'#e74c3c';
  ctx.font=`bold ${Math.round(muteH*0.55)}px Georgia`; ctx.textAlign='center';

// Centralized layout calculator for char select
function charLayout() {
  const {pad, fs} = ui();
  const titleH  = fs.xl + 24;
  const btnH2   = Math.round(Math.min(H*0.09, 56));
  const btnGap  = 10;
  const gap     = Math.max(8, Math.round(W*0.012));
  const bw2     = Math.min(200, W*0.28);
  const backW   = Math.min(120, W*0.16);
  const bottomH = btnH2 + btnGap + 24;  // buttons + labels below
  const availH  = H - titleH - pad*2 - bottomH;
  const cardW   = Math.floor((W - pad*2 - gap*2) / 3);
  const cardH   = Math.min(availH, Math.round(cardW * 1.55));
  const startX  = Math.round((W - (cardW*3 + gap*2)) / 2);
  const cardY   = titleH + pad + Math.round((availH - cardH)/2);
  const btnY    = cardY + cardH + btnGap;
  return {pad, fs, titleH, btnH2, btnGap, gap, bw2, backW, cardW, cardH, startX, cardY, btnY};
}

function drawCharSelect(){
  const {pad, fs, titleH, btnH2, gap, bw2, backW, cardW, cardH, startX, cardY, btnY} = charLayout();

  // Background
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#1a1a2e');bg.addColorStop(1,'#050810');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const st=Date.now()*0.0002;
  for(let i=0;i<60;i++){const sx=(Math.sin(i*137.5)*0.5+0.5)*W,sy=(Math.cos(i*93.7)*0.5+0.5)*H,sa=0.3+Math.sin(st*3+i)*0.5;ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fillStyle=`rgba(200,200,255,${sa})`;ctx.fill();}

  // Title
  ctx.save();ctx.textAlign='center';
  ctx.shadowBlur=25;ctx.shadowColor='#c0932a';
  ctx.fillStyle='#c0932a';ctx.font=`bold ${fs.xl}px Georgia`;
  ctx.fillText('ELIGE TU PERSONAJE',W/2, pad+fs.xl);
  ctx.shadowBlur=0;ctx.restore();

  const chars=['lito','anita','flami'];

  chars.forEach((ch,i)=>{
    const def=CHAR_DEFS[ch];
    const cx=startX+i*(cardW+gap);
    const hover=charHover===ch, selected=selectedChar===ch;

    // Card BG
    ctx.fillStyle=`rgba(5,8,16,${selected?0.96:0.82})`;
    ctx.fillRect(cx,cardY,cardW,cardH);
    if(selected||hover){ctx.shadowBlur=16;ctx.shadowColor=def.col;}
    ctx.strokeStyle=selected?def.col:hover?def.col+'99':'#334';
    ctx.lineWidth=selected?2.5:hover?1.8:1.2;
    ctx.strokeRect(cx,cardY,cardW,cardH);
    ctx.shadowBlur=0;

    // Top accent strip
    ctx.fillStyle=def.col+(selected?'44':'18');
    ctx.fillRect(cx,cardY,cardW,4);

    // ── Layout sections within card ──
    const innerW = cardW - 16;
    const innerX = cx + 8;

    // Character preview (top 42% of card)
    const previewH = Math.round(cardH * 0.42);
    const previewCX = cx + cardW/2;
    const previewCY = cardY + Math.round(previewH * 0.52);
    const charScale = Math.min(1.9, (cardW / 120));

    ctx.save();
    if(selected){ctx.shadowBlur=18;ctx.shadowColor=def.col;}
    const bob=Math.sin(Date.now()*0.003+i)*4;
    if(ch==='lito'){
      const _gs=GSC()*charScale;
      ctx.translate(previewCX,previewCY+bob);ctx.scale(_gs,_gs);
      litoCore(ctx,'innocent',1,previewCX+50,previewCY,previewCY+bob);
    } else if(ch==='anita'){
      drawAnita(previewCX,previewCY+bob,1,'innocent',charScale);
    } else {
      drawFlami(previewCX,previewCY+bob,1,'innocent',charScale);
    }
    ctx.restore();

    // ── Text section (below preview) ──
    let textY = cardY + previewH + 6;

    // Name
    ctx.fillStyle=selected?def.col:'white';
    ctx.font=`bold ${Math.max(13,Math.round(cardW*0.115))}px Georgia`;
    ctx.textAlign='center';
    ctx.fillText(def.name, cx+cardW/2, textY);
    textY += Math.round(cardW*0.085);

    // Subtitle
    ctx.fillStyle=def.col+'bb';
    ctx.font=`${Math.max(9,Math.round(cardW*0.07))}px Georgia`;
    ctx.fillText(def.subtitle, cx+cardW/2, textY);
    textY += Math.round(cardW*0.09);

    // Stats bars
    const statH = Math.max(5, Math.round(cardH*0.022));
    const statW = innerW;
    const statFs = Math.max(8, Math.round(cardW*0.068));
    [['HP',def.hp/185],['SPD',def.speed/4.8],['ATQ',1-def.atkRate/60]].forEach(([lbl,val])=>{
      ctx.fillStyle='#888';ctx.font=`${statFs}px Georgia`;ctx.textAlign='left';
      ctx.fillText(lbl, innerX, textY);
      const barX=innerX+statFs*2.2, barW2=statW-statFs*2.4;
      ctx.fillStyle='#1a1a2e';ctx.fillRect(barX,textY-statH+1,barW2,statH);
      ctx.fillStyle=def.col;ctx.fillRect(barX,textY-statH+1,barW2*Math.min(1,val),statH);
      textY+=statH+5;
    });
    textY += 4;

    // Passive
    const passFs = Math.max(8, Math.round(cardW*0.068));
    ctx.fillStyle='#c0932a';ctx.font=`bold ${passFs}px Georgia`;ctx.textAlign='center';
    // Truncate if needed
    const passText='★ '+def.passive;
    ctx.fillText(passText.length>28?passText.substr(0,26)+'…':passText, cx+cardW/2, textY);
    textY += passFs + 6;

    // Ability icons (remaining space)
    const abSlots=Object.values(def.abilities);
    const abRemaining = (cardY+cardH-16) - textY;
    const abSize = Math.max(18, Math.min(Math.round(abRemaining*0.85), Math.round((innerW - gap*(abSlots.length-1))/abSlots.length)));
    if(abSize>=16 && abRemaining > 20){
      const abTotalW = abSlots.length*abSize + (abSlots.length-1)*4;
      const abStartX = cx + (cardW-abTotalW)/2;
      abSlots.forEach((ab,ai)=>{
        const ax=abStartX+ai*(abSize+4), ay=textY;
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ax,ay,abSize,abSize);
        ctx.strokeStyle=ab.col;ctx.lineWidth=1;ctx.strokeRect(ax,ay,abSize,abSize);
        ctx.font=`${Math.round(abSize*0.52)}px serif`;ctx.textAlign='center';
        ctx.fillText(ab.icon,ax+abSize/2,ay+abSize*0.66);
        ctx.fillStyle='#777';ctx.font=`${Math.max(7,Math.round(abSize*0.28))}px Georgia`;
        ctx.fillText(ab.key,ax+abSize/2,ay+abSize+9);
      });
    }

    // Selected badge at bottom
    if(selected){
      ctx.fillStyle=def.col+'dd';
      ctx.font=`bold ${Math.max(9,Math.round(cardW*0.075))}px Georgia`;
      ctx.textAlign='center';
      ctx.fillText('✓ SELECCIONADO', cx+cardW/2, cardY+cardH-6);
    }
  });

  // ── Buttons ──
  const playDef=CHAR_DEFS[selectedChar];
  btn('►  JUGAR', playDef.name, W/2-bw2/2, btnY, bw2, btnH2, charHover==='_play');
  btn('← Volver','', W/2-bw2/2-backW-12, btnY, backW, btnH2, charHover==='_back');
}

function handleCharSelectTap(x,y){
  const {cardW,cardH,cardY,startX,gap,btnY,btnH2,bw2,backW} = charLayout();
  const chars=['lito','anita','flami'];

  // Card tap
  chars.forEach((ch,i)=>{
    const cx=startX+i*(cardW+gap);
    if(x>=cx&&x<=cx+cardW&&y>=cardY&&y<=cardY+cardH){ selectedChar=ch; playMenuClick(); }
  });
  // Play button
  if(x>=W/2-bw2/2&&x<=W/2+bw2/2&&y>=btnY&&y<=btnY+btnH2){ playMenuClick(); startSingleGame(); }
  // Back button
  const backX=W/2-bw2/2-backW-12;
  if(x>=backX&&x<=backX+backW&&y>=btnY&&y<=btnY+btnH2){ playMenuClick(); gs=GS.MENU; }
}

// ── MULTIPLAYER: FIREBASE FUNCTIONS ────────────────────
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<4;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
}

function createRoom(){
  if(!db||!firebaseReady){ lobbyError=firebaseError?'Error: '+firebaseError:'Aún conectando a Firebase, intenta en un momento...'; return; }
  roomCode=genCode(); isHost=true;
  myColorIdx=0;
  roomRef=db.ref('rooms/'+roomCode);
  const myEntry={ name:myName, colorIdx:myColorIdx };
  roomRef.set({
    host:myId, status:'lobby',
    wave:0, waveTimer:0, totalKills:0,
    players:{ [myId]: myEntry }
  }).then(()=>{
    lobbyPlayers={ [myId]: myEntry };
    lobbySubState='waiting'; lobbyError='';
    listenLobby();
    // Remove room on disconnect
    roomRef.onDisconnect().remove();
    roomRef.child('players/'+myId).onDisconnect().remove();
  }).catch(e=>{ lobbyError='Error al crear sala: '+e.message; });
}

function tryJoinRoom(code){
  if(!db||!firebaseReady){ lobbyError=firebaseError?'Error: '+firebaseError:'Aún conectando a Firebase, intenta en un momento...'; return; }
  const ref=db.ref('rooms/'+code);
  ref.once('value').then(snap=>{
    const data=snap.val();
    if(!data){ lobbyError='Sala no encontrada: '+code; return; }
    if(data.status!=='lobby'){ lobbyError='La sala ya está en juego'; return; }
    const pCount=Object.keys(data.players||{}).length;
    if(pCount>=5){ lobbyError='Sala llena (máximo 5 jugadores)'; return; }
    // Assign color
    const usedColors=Object.values(data.players||{}).map(p=>p.colorIdx);
    myColorIdx=[0,1,2,3,4].find(c=>!usedColors.includes(c))||0;
    isHost=false; roomCode=code; roomRef=ref;
    const myEntry={name:myName,colorIdx:myColorIdx};
    ref.child('players/'+myId).set(myEntry).then(()=>{
      lobbyPlayers=data.players||{}; lobbyPlayers[myId]=myEntry;
      lobbySubState='waiting'; lobbyError='';
      listenLobby();
      ref.child('players/'+myId).onDisconnect().remove();
    }).catch(e=>{ lobbyError='Error al unirse: '+e.message; });
  }).catch(e=>{ lobbyError='Error: '+e.message; });
}

function listenLobby(){
  if(!roomRef) return;
  // Listen to players
  roomRef.child('players').on('value', snap=>{
    const data=snap.val()||{};
    lobbyPlayers=data;
    // If we got kicked (our entry gone) and not by us
    if(!data[myId]&&gs===GS.LOBBY){ leaveRoom(); gs=GS.MENU; }
  });
  // Listen to game status (to detect when host starts game)
  roomRef.child('status').on('value', snap=>{
    const status=snap.val();
    if(status==='playing'&&gs===GS.LOBBY&&!isHost){
      // Get wave spawn data then start
      roomRef.child('waveSpawn').once('value', wSnap=>{
        const wData=wSnap.val();
        if(wData){ applyWaveSpawn(wData); }
        gs=GS.PLAYING; gameMode='multi';
        initPlayerForMulti();
        listenGame();
      });
    }
    if(status==='gameover'&&gs===GS.PLAYING){ gs=GS.GAMEOVER; saveBestScore(); playGameOver(); }
  });
}

function hostStartGame(){
  if(!isHost||!roomRef) return;
  // Check enough players
  const cnt=Object.keys(lobbyPlayers).length;
  if(cnt<1) return;
  initPlayerForMulti();
  listenGame();
  // Spawn first wave
  wave=1; waveTimer=180;
  const spawnData=buildWaveSpawn(wave);
  roomRef.update({ status:'playing', wave:1, waveTimer:180, totalKills:0, waveSpawn:spawnData });
  enemies=[];
  applyWaveSpawn(spawnData);
  gs=GS.PLAYING; playWaveStart();
}

function buildWaveSpawn(w){
  const spawnList=[];
  function randEdge(){
    const side=Math.floor(Math.random()*4);let x,y;
    if(side===0){x=aX+Math.random()*aW;y=aY-30;}
    else if(side===1){x=aX+aW+30;y=aY+Math.random()*aH;}
    else if(side===2){x=aX+Math.random()*aW;y=aY+aH+30;}
    else{x=aX-30;y=aY+Math.random()*aH;}
    return {x:Math.round(x),y:Math.round(y)};
  }
  if(isBossWave(w)){
    // Boss wave: include boss data + minions
    spawnList.push({id:'boss_'+w,type:'__boss__',isBoss:true,bossWave:w,x:Math.round(W/2),y:Math.round(aY+80)});
    const minionCount=3+Math.floor((w/5-1)*2);
    for(let i=0;i<minionCount;i++){
      const pos=randEdge();
      spawnList.push({id:'m_'+Math.random().toString(36).substr(2,8),type:'goblin',...pos});
    }
  } else {
    const conf=waveConf(w);
    for(const [type,cnt] of Object.entries(conf)){
      for(let i=0;i<cnt;i++){
        const pos=randEdge();
        spawnList.push({id:'e_'+Math.random().toString(36).substr(2,8),type,...pos});
      }
    }
  }
  return {wave:w,list:spawnList};
}

function applyWaveSpawn(data){
  enemies=[];
  bossActive=false; bossEnemy=null;
  if(!data||!data.list) return;
  for(const e of data.list){
    if(e.isBoss){
      // Reconstruct boss from bossWave id
      const def=getBossDef(e.bossWave);
      const boss={id:e.id,type:def.type,x:e.x,y:e.y,
        r:Math.round(def.r*GSC()),hp:def.hp,maxHp:def.hp,
        spd:def.spd,dmg:def.dmg,xp:def.xp,
        col:def.col,dark:def.dark||'#111',name:def.name,
        hitFlash:0,wb:0,wbSpd:0.03,isBoss:true,
        shootTimer:0,chargeTimer:0,phase:1};
      enemies.push(boss);
      bossActive=true; bossEnemy=boss;

      addDamageText(W/2,H/2-60,'\uD83D\uDC51 \u00A1APARECE EL JEFE!','#f1c40f',28);

function listenGame(){
  if(!roomRef) return;
  // Listen to other players' states
  roomRef.child('playerStates').on('value', snap=>{
    const data=snap.val()||{};
    for(const [pid,state] of Object.entries(data)){
      if(pid===myId) continue;
      if(!remotePlayers[pid]) remotePlayers[pid]={...state};
      else Object.assign(remotePlayers[pid],state);
    }
    // Remove players that left
    for(const pid of Object.keys(remotePlayers)){
      if(!data[pid]) delete remotePlayers[pid];
    }
  });
  // Listen to enemy kills
  roomRef.child('kills').on('child_added', snap=>{
    const eid=snap.key;
    enemies=enemies.filter(e=>e.id!==eid);
  });
  // Listen to wave spawns (for non-host when new wave starts)
  if(!isHost){
    roomRef.child('waveSpawn').on('value', snap=>{
      const data=snap.val();
      if(!data) return;
      if(data.wave!==wave){
        wave=data.wave; waveTimer=data.waveTimer||0;
        applyWaveSpawn(data);
        gs=GS.PLAYING; playWaveStart();
      }
    });
    roomRef.child('wave').on('value', snap=>{ if(snap.val()!==null) wave=snap.val(); });
    roomRef.child('totalKills').on('value', snap=>{ if(snap.val()!==null) totalKills=snap.val(); });
    roomRef.child('waveStatus').on('value', snap=>{
      const ws=snap.val();
      if(ws==='clear'&&gs===GS.PLAYING){ gs=GS.WCLR; clearTimer=150; playWaveClear(); }
    });
  }
}

function pushMyState(){
  if(!roomRef||gameMode!=='multi') return;
  roomRef.child('playerStates/'+myId).set({
    name:myName,colorIdx:myColorIdx,char:selectedChar,
    x:Math.round(lito.x),y:Math.round(lito.y),
    hp:Math.round(lito.hp),maxHp:lito.maxHp,
    level:lito.level,score:lito.score,
    facing:lito.facing,expression:lito.expression,
    hitFlash:lito.hitFlash>0?1:0,alive:lito.hp>0
  });
}

function reportEnemyKill(eid, xpAmt, isBrute){
  if(!roomRef||gameMode!=='multi') return;
  roomRef.child('kills/'+eid).transaction(val=>{
    if(val!==null) return; // already killed
    return {by:myId,ts:Date.now()};
  }, (err,committed)=>{
    if(committed){
      // We got the kill - add XP and score
      lito.xp+=xpAmt; lito.score+=xpAmt*20; totalKills++;
      if(isHost) roomRef.child('totalKills').set(totalKills);
      playEnemyDeath(isBrute);
      screenShake=Math.max(screenShake,isBrute?12:5);
      saveBestScore();
    }
  });
}

function leaveRoom(){
  if(roomRef){
    roomRef.child('players/'+myId).remove();
    roomRef.child('playerStates/'+myId).remove();
    if(isHost) roomRef.remove();
    roomRef.off();
    roomRef=null;
  }
  remotePlayers={}; lobbyPlayers={};
  isHost=false; roomCode=''; gameMode='single';
}

function manualShoot(){ shoot(Math.atan2(mouseY-lito.y,mouseX-lito.x)); }
function autoShoot(){
  if(!enemies.length) return;
  let near=null,nd=Infinity;
  for(const e of enemies){ const d=Math.hypot(e.x-lito.x,e.y-lito.y); if(d<nd){nd=d;near=e;} }
  if(near) shoot(Math.atan2(near.y-lito.y,near.x-lito.x));
}
function shoot(a){ playShoot(); const _r=Math.max(4,Math.round(7*GSC())); const dmg=(lito.dmgBase||22)+lito.level*4; const col=CHAR_DEFS[selectedChar].col; projectiles.push({x:lito.x,y:lito.y,vx:Math.cos(a)*7.5,vy:Math.sin(a)*7.5,r:_r,dmg:dmg,age:0,col}); }

function tryDash(){
  if(lito.dashCooldown>0||lito.dashTimer>0) return;
  let dx=0,dy=0;
  if(controlMode==='mobile'){dx=joy.dx;dy=joy.dy;}
  else{if(keys['w']||keys['arrowup'])dy-=1;if(keys['s']||keys['arrowdown'])dy+=1;if(keys['a']||keys['arrowleft'])dx-=1;if(keys['d']||keys['arrowright'])dx+=1;}
  if(!dx&&!dy){const ang=Math.atan2(mouseY-lito.y,mouseX-lito.x);dx=Math.cos(ang);dy=Math.sin(ang);}
  const len=Math.hypot(dx,dy)||1;lito.vx=dx/len;lito.vy=dy/len;
  lito.dashTimer=lito.dashDuration;lito.dashCooldown=lito.dashCooldownMax;
  lito.invulnTimer=Math.max(lito.invulnTimer,lito.dashDuration);
  playDash();screenShake=Math.max(screenShake,7);
  for(let i=0;i<14;i++){const a=Math.atan2(lito.vy,lito.vx)+Math.PI+(Math.random()-0.5)*0.8,s=1+Math.random()*5;particles.push({x:lito.x,y:lito.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,col:'#98D8C8',life:1,dec:0.05+Math.random()*0.03});}
}

function spawnParticles(x,y,col,n){ for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*5,col,life:1,dec:0.03+Math.random()*0.04});} }

// ── UPDATE ─────────────────────────────────────────────
function update(DT=1){
  if(gs===GS.PLAYING){
    moveLito(DT); moveEnemies(DT); moveProjectiles(DT); moveParticles(DT); moveOrbs(DT); updateAbilityFX(DT);
    updateDamageTexts(DT); collide();
    lito.atkTimer+=DT; if(lito.atkTimer>=lito.atkRate){lito.atkTimer=0;autoShoot();}
    // Wave timer (only advance for SP or host in MP)
    if(gameMode==='single'||isHost){
      if(waveTimer>0){ waveTimer-=DT; if(waveTimer<0)waveTimer=0; }
      if(waveTimer<=0&&enemies.length===0){ gs=GS.WCLR; clearTimer=150; playWaveClear(); if(gameMode==='multi'&&isHost) roomRef.child('waveStatus').set('clear'); }
    }
    const hr=lito.hp/lito.maxHp; lito.expression=hr>0.6?'innocent':hr>0.3?'serious':'surprised';
    if(lito.hitFlash>0){ lito.hitFlash-=DT; if(lito.hitFlash<0)lito.hitFlash=0; }
    // MP sync
    if(gameMode==='multi'){
      mpSyncTimer++; if(mpSyncTimer>=MP_SYNC_EVERY){mpSyncTimer=0;pushMyState();}
    }
  } else if(gs===GS.WCLR){
    moveParticles(DT);updateDamageTexts(DT);if(lito.hitFlash>0)lito.hitFlash--;
    clearTimer-=DT;
    if(clearTimer<=0&&(gameMode==='single'||isHost)){ gs=GS.PLAYING; nextWave(); }
  } else if(gs===GS.GAMEOVER||gs===GS.PAUSE){ updateDamageTexts(); }
  if(screenShake>0){ screenShake*=Math.pow(0.82,DT); if(screenShake<0.1)screenShake=0; }
}

function moveLito(DT=1){
  lito.r = Math.round(22 * GSC()); // collision radius matches visual
  let dx=0,dy=0;
  if(controlMode==='mobile'){dx=joy.dx;dy=joy.dy;}
  else{if(keys['w']||keys['arrowup'])dy-=1;if(keys['s']||keys['arrowdown'])dy+=1;if(keys['a']||keys['arrowleft'])dx-=1;if(keys['d']||keys['arrowright'])dx+=1;if(dx&&dy){dx*=0.707;dy*=0.707;}}
  if(lito.dashCooldown>0){ lito.dashCooldown-=DT; if(lito.dashCooldown<0)lito.dashCooldown=0; }
  if(lito.invulnTimer>0){ lito.invulnTimer-=DT; if(lito.invulnTimer<0)lito.invulnTimer=0; }
  if(litoSpeedBoost>0){ litoSpeedBoost-=DT; if(litoSpeedBoost<0)litoSpeedBoost=0; }
  let mspd=lito.speed*(litoSpeedBoost>0?ORB_SPEED_MULT:1),mx2=dx,my2=dy;
  if(lito.dashTimer>0){lito.dashTimer-=DT;mspd=lito.dashSpeed;mx2=lito.vx;my2=lito.vy;spawnParticles(lito.x,lito.y,'rgba(152,216,200,0.9)',1);}
  lito.x=Math.max(aX+lito.r,Math.min(aX+aW-lito.r,lito.x+mx2*mspd*DT));
  lito.y=Math.max(aY+lito.r,Math.min(aY+aH-lito.r,lito.y+my2*mspd*DT));
  if(lito.xp>=lito.xpNeed){ lito.xp-=lito.xpNeed;lito.level++;lito.xpNeed=Math.floor(lito.level*100*1.08);lito.maxHp+=20;lito.atkRate=Math.max(14,lito.atkRate-2);playLevelUp();screenShake=Math.max(screenShake,9);spawnParticles(lito.x,lito.y,'#f1c40f',25);addDamageText(lito.x,lito.y-28,'LEVEL UP!','#f1c40f',24); }
}

// Enemy projectiles (arrows from archers)
let enemyProjectiles = [];

function moveEnemies(DT=1){
  for(const e of enemies){
    e.wb+=e.wbSpd;
    const t=nearestPlayer(e.x,e.y);
    const dx=t.x-e.x,dy2=t.y-e.y,d=Math.hypot(dx,dy2)||1;

    // Archer: keep distance and shoot
    if(e.type==='archer'){
      const keepDist=200;
      if(d<keepDist){ e.x-=dx/d*e.spd*DT; e.y-=dy2/d*e.spd*DT; }
      else if(d>keepDist+60){ e.x+=dx/d*e.spd*DT; e.y+=dy2/d*e.spd*DT; }
      e.shootCd-=DT;
      if(e.shootCd<=0){
        e.shootCd=80+Math.random()*40;
        const ang=Math.atan2(dy2,dx);
        enemyProjectiles.push({x:e.x,y:e.y,vx:Math.cos(ang)*4.5,vy:Math.sin(ang)*4.5,r:5,dmg:e.dmg*0.6,age:0,col:'#f1c40f'});
      }
    }
    // Phantom: phases through walls briefly, erratic movement
    else if(e.type==='phantom'){
      const jitter=(Math.random()-0.5)*2;
      e.x+=dx/d*e.spd*DT+jitter*DT; e.y+=dy2/d*e.spd*DT+jitter*DT;
    }
    // Boss: special patterns
    else if(e.isBoss){
      e.chargeTimer=(e.chargeTimer||0)+DT;
      // Phase 2 at 50% HP
      if(e.hp<e.maxHp*0.5) e.phase=2;
      const bspd=e.phase===2?e.spd*1.5:e.spd;
      e.x+=dx/d*bspd*DT; e.y+=dy2/d*bspd*DT;
      // Boss shoots projectile bursts
      e.shootTimer=(e.shootTimer||0)+DT;
      const shootInterval=e.phase===2?50:80;
      if(e.shootTimer>=shootInterval){
        e.shootTimer=0;
        const bullets=e.phase===2?8:5;
        for(let b=0;b<bullets;b++){
          const ang=(b/bullets)*Math.PI*2;
          enemyProjectiles.push({x:e.x,y:e.y,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5,r:8,dmg:e.dmg*0.45,age:0,col:e.col,isBossProj:true});
        }
        screenShake=Math.max(screenShake,4);
      }
    }
    // Normal movement
    else {
      e.x+=dx/d*e.spd*DT;e.y+=dy2/d*e.spd*DT;
    }

    e.x=Math.max(aX-35,Math.min(aX+aW+35,e.x));e.y=Math.max(aY-35,Math.min(aY+aH+35,e.y));
    if(e.hitFlash>0){ e.hitFlash-=DT; if(e.hitFlash<0)e.hitFlash=0; }
    if(e.burn>0){ e.burn-=DT; e.hp-=(e.burnDmg||0)*DT; if(Math.floor(e.burn)%20===0) spawnParticles(e.x,e.y-e.r,'#ff6b35',3); }
  }
  // Separation push
  for(let i=0;i<enemies.length;i++) for(let j=i+1;j<enemies.length;j++){
    const a=enemies[i],b=enemies[j],dx=b.x-a.x,dy2=b.y-a.y,d=Math.hypot(dx,dy2),mn=a.r+b.r;
    if(d<mn&&d>0){const f=(mn-d)/d*0.45;a.x-=dx*f;a.y-=dy2*f;b.x+=dx*f;b.y+=dy2*f;}
  }
  // Enemy projectile movement + collision with player
  for(let i=enemyProjectiles.length-1;i>=0;i--){
    const ep=enemyProjectiles[i];
    ep.x+=ep.vx*DT;ep.y+=ep.vy*DT;ep.age+=DT;
    if(ep.x<-50||ep.x>W+50||ep.y<-50||ep.y>H+50||ep.age>140){enemyProjectiles.splice(i,1);continue;}
    if(Math.hypot(ep.x-lito.x,ep.y-lito.y)<ep.r+lito.r&&lito.invulnTimer<=0){
      lito.hp-=ep.dmg;lito.hitFlash=5;lito.invulnTimer=15;
      playLitoHurt();screenShake=Math.max(screenShake,6);
      addDamageText(lito.x,lito.y-26,'-'+Math.ceil(ep.dmg),'#ff7b7b',18);
      if(lito.hp<=0){lito.hp=0;saveBestScore();if(gameMode==='multi'){const anyAlive=Object.values(remotePlayers).some(p=>p.alive!==false&&(p.hp||0)>0);if(!anyAlive){playGameOver();gs=GS.GAMEOVER;if(isHost)roomRef.child('status').set('gameover');}else{addDamageText(lito.x,lito.y-40,'¡CAÍSTE!','#e74c3c',26);}}else{playGameOver();gs=GS.GAMEOVER;}}
      enemyProjectiles.splice(i,1);
    }
  }
}

function drawEnemyProjectiles(){
  for(const ep of enemyProjectiles){
    ctx.save();
    ctx.shadowBlur=ep.isBossProj?14:8;
    ctx.shadowColor=ep.col||'#f1c40f';
    ctx.beginPath();ctx.arc(ep.x,ep.y,ep.r,0,Math.PI*2);
    const g=ctx.createRadialGradient(ep.x,ep.y,0,ep.x,ep.y,ep.r);
    g.addColorStop(0,'white');g.addColorStop(1,ep.col||'#f1c40f');
    ctx.fillStyle=g;ctx.fill();ctx.shadowBlur=0;ctx.restore();
  }
}
function moveProjectiles(DT=1){ for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.x+=p.vx*DT;p.y+=p.vy*DT;p.age+=DT;if(p.x<-50||p.x>W+50||p.y<-50||p.y>H+50||p.age>100)projectiles.splice(i,1);} }
function moveParticles(DT=1){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.isXP){const dx=lito.x-p.x,dy2=lito.y-p.y,d=Math.hypot(dx,dy2)||1;if(d<45){lito.xp+=p.xp;lito.score+=p.xp*10;playXP();particles.splice(i,1);continue;}const spd2=1.5+(200-d)*0.015;p.vx=dx/d*spd2;p.vy=dy2/d*spd2;}else{p.vy+=0.06*DT;}
    p.x+=p.vx*DT;p.y+=p.vy*DT;p.life-=p.dec*DT;if(p.life<=0)particles.splice(i,1);
  }
}
function updateDamageTexts(DT=1){ for(let i=damageTexts.length-1;i>=0;i--){const d=damageTexts[i];d.y+=d.vy*DT;d.life-=0.025*DT;if(d.life<=0)damageTexts.splice(i,1);} }
function drawDamageTexts(){ for(const d of damageTexts){ctx.save();ctx.globalAlpha=Math.max(0,d.life);ctx.fillStyle=d.color;ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.lineWidth=4;ctx.font=`bold ${d.size}px Georgia`;ctx.textAlign='center';ctx.strokeText(d.value,d.x,d.y);ctx.fillText(d.value,d.x,d.y);ctx.restore();} }

function collide(){
  // Projectiles vs enemies
  for(let i=projectiles.length-1;i>=0;i--){
    const pr=projectiles[i];let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.hypot(pr.x-e.x,pr.y-e.y)<pr.r+e.r){
        e.hp-=pr.dmg;e.hitFlash=8;hit=true;
        // Flami passive: burn
        if(selectedChar==='flami'&&!e.burn){ e.burn=120; e.burnDmg=pr.dmg*0.08; }
        playHit();
        addDamageText(e.x+(Math.random()*18-9),e.y-e.r,Math.ceil(pr.dmg),'#ffffff',18);
        if(e.hp<=0){
          spawnParticles(e.x,e.y,e.col,14);
          const isBoss2=e.isBoss;
          addDamageText(e.x,e.y-12,isBoss2?'👑 JEFE DERROTADO!':'KO!',isBoss2?'#f1c40f':'#ffcf5a',isBoss2?28:22);
          // Bomber explodes on death
          if(e.type==='bomber'){
            screenShake=Math.max(screenShake,18);spawnParticles(e.x,e.y,'#ff6600',30);
            for(const nearby of enemies){ if(nearby&&nearby.id!==e.id&&Math.hypot(nearby.x-e.x,nearby.y-e.y)<90) nearby.hp-=80; }
            if(Math.hypot(lito.x-e.x,lito.y-e.y)<90&&lito.invulnTimer<=0){ lito.hp-=40;lito.hitFlash=8;addDamageText(lito.x,lito.y-30,'-40 EXPLOSIÓN','#ff6600',20); }
          }
          // Boss drops lots of orbs
          if(isBoss2){ bossActive=false;bossEnemy=null;
            for(let ob=0;ob<6;ob++) spawnOrb(e.x+(Math.random()-0.5)*60,e.y+(Math.random()-0.5)*60,Math.random()<0.6?'heal':'speed');
            screenShake=25;
          } else {
            // Normal enemies: 18% chance heal orb, 10% chance speed orb
            const rnd=Math.random();
            if(rnd<0.18) spawnOrb(e.x,e.y,'heal');
            else if(rnd<0.28) spawnOrb(e.x,e.y,'speed');
          }
          if(gameMode==='multi'){ reportEnemyKill(e.id,e.xp,isBoss2); enemies.splice(j,1); }
          else{ playEnemyDeath(isBoss2||e.type==='brute');spawnXP(e.x,e.y,e.xp);screenShake=Math.max(screenShake,isBoss2?22:e.type==='brute'?12:5);lito.score+=e.xp*20;totalKills++;saveBestScore();enemies.splice(j,1); }
        }
        break;
      }
    }
    if(hit)projectiles.splice(i,1);
  }
  // Enemies vs local player
  for(const e of enemies){
    if(Math.hypot(e.x-lito.x,e.y-lito.y)<e.r+lito.r&&lito.invulnTimer<=0){
      const dmg=e.dmg*0.016;lito.hp-=dmg;lito.hitFlash=5;lito.invulnTimer=10;
      playLitoHurt();screenShake=Math.max(screenShake,8);
      addDamageText(lito.x,lito.y-26,'-'+Math.max(1,Math.ceil(dmg)),'#ff7b7b',20);
      if(lito.hp<=0){
        lito.hp=0;saveBestScore();
        // Check if all players dead in MP
        if(gameMode==='multi'){
          const anyAlive=Object.values(remotePlayers).some(p=>p.alive!==false&&(p.hp||0)>0);
          if(!anyAlive){ playGameOver();gs=GS.GAMEOVER;if(isHost) roomRef.child('status').set('gameover'); }
          else{ addDamageText(lito.x,lito.y-40,'¡CAÍSTE!','#e74c3c',26); }
        } else { playGameOver();gs=GS.GAMEOVER; }
      }
    }
  }
}

// ── MAIN LOOP ──────────────────────────────────────────
// Delta time system — makes movement frame-rate independent
// All speeds are defined in pixels-per-second, then scaled by dt each frame.
// Target is 60fps → dt=1.0. At 120fps → dt=0.5, at 30fps → dt=2.0
let _lastTime = 0;
const TARGET_FPS = 60;
const MAX_DT = 3.0; // cap to avoid huge jumps after tab switch

function loop(timestamp){
  // Calculate delta time (capped and smoothed)
  const raw = _lastTime ? (timestamp - _lastTime) / (1000/TARGET_FPS) : 1.0;
  const DT = Math.min(raw, MAX_DT);
  _lastTime = timestamp;
  // Track FPS (smoothed)
  if(!window._fpsArr) window._fpsArr=[];
  window._fpsArr.push(Math.round(1000/(raw*(1000/TARGET_FPS)||16.7)));
  if(window._fpsArr.length>30){window._fpsArr.shift();window._fpsDisplay=Math.round(window._fpsArr.reduce((a,b)=>a+b,0)/window._fpsArr.length);}

  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(screenShake>0) ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);

  // Cursor
  canvas.classList.toggle('ui-cursor', gs!==GS.PLAYING&&gs!==GS.WCLR);

  if(gs===GS.MENU){
    drawMenu();
  } else if(gs===GS.CHARSELECT){
    drawCharSelect();
  } else if(gs===GS.LOBBY){
    drawLobby();
  } else if(gs===GS.PLAYING||gs===GS.WCLR){
    drawArena();drawParticles();drawOrbs();
    for(const ep of enemyProjectiles) { ctx.save();ctx.shadowBlur=8;ctx.shadowColor=ep.col||'#f1c40f';ctx.beginPath();ctx.arc(ep.x,ep.y,ep.r,0,Math.PI*2);const _g=ctx.createRadialGradient(ep.x,ep.y,0,ep.x,ep.y,ep.r);_g.addColorStop(0,'white');_g.addColorStop(1,ep.col||'#f1c40f');ctx.fillStyle=_g;ctx.fill();ctx.shadowBlur=0;ctx.restore(); }
    for(const p of projectiles) drawProjectile(p);
    for(const e of enemies){if(drawFns[e.type])drawFns[e.type](ctx,e);drawEnemyHP(e);}
    // Draw remote players first (behind local)
    for(const p of Object.values(remotePlayers)) drawRemotePlayer(p);
    drawAbilityFX();
    drawLito();
    if(bossActive&&bossEnemy) drawBossBar();
    drawHUD();drawAbilityHUD();drawMobileAbilityBtns();drawMobileControls();drawCountdown();
    if(gs===GS.WCLR) drawWaveClear();
    // Speed boost indicator
    if(litoSpeedBoost>0){const {fs,pad}=ui();ctx.save();ctx.globalAlpha=Math.min(1,litoSpeedBoost/30)*0.7;ctx.fillStyle='#3498db';ctx.font=`bold ${fs.xs}px Georgia`;ctx.textAlign='center';ctx.fillText('⚡ TURBO: '+Math.ceil(litoSpeedBoost/60)+'s',W/2,H-pad*0.8);ctx.restore();}
    drawCrosshair();
  } else if(gs===GS.GAMEOVER){
    drawArena();
    for(const e of enemies)drawFns[e.type](ctx,e);
    for(const p of Object.values(remotePlayers)) drawRemotePlayer(p);
    drawLito();drawGameOver();drawCrosshair();
  } else if(gs===GS.PAUSE){
    drawArena();drawParticles();
    for(const p of projectiles) drawProjectile(p);
    for(const e of enemies){drawFns[e.type](ctx,e);drawEnemyHP(e);}
    for(const p of Object.values(remotePlayers)) drawRemotePlayer(p);
    drawLito();drawHUD();drawMobileControls();drawPauseMenu();
  }

  drawDamageTexts();
  ctx.restore();
  update(DT);
  requestAnimationFrame(loop);
}
loop();
</script>
